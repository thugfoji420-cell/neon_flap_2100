name: neon_flap1_game
description: "Neon Flap 2100 - A futuristic cyberpunk arcade flapper built with Flutter & Flame."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.24.0
  get_it: ^9.2.1
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.2.0
  url_launcher: ^6.3.1
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_crashlytics: ^5.2.6
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
